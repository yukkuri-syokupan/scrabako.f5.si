<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabako</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sub-color: #777777;
            --border-color: #e5e5e5;
            --card-bg: #fafafa;
            --answer-bg: #f1f2f6;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg-color); 
            color: var(--text-color);
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh; 
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1000px; 
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 👑 タイトルを常に画面中央に */
        h1 { 
            font-size: 36px; 
            font-weight: 700;
            margin: 0 auto 35px auto;
            letter-spacing: 0.05em;
            text-align: center;
        }

        /* 👥 2カラムレイアウト */
        .main-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            justify-content: center; /* コンテンツが少ない時に中央寄せ */
            transition: all 0.3s ease;
        }

        /* 👈 左側：プロフィール・設定・投稿エリア */
        .left-column {
            flex: 1;
            min-width: 320px;
            max-width: 420px;
            position: sticky;
            top: 20px;
            transition: all 0.3s ease;
        }

        /* 🎯 お題が非表示・存在しない場合、左側カラムを画面のど真ん中に持ってくるスタイル */
        .main-layout.center-mode {
            justify-content: center;
        }
        .main-layout.center-mode .left-column {
            max-width: 460px;
            flex: 1;
        }

        /* 👉 右側：お題リスト（受信箱）エリア */
        .right-column {
            flex: 1.5;
            min-width: 0; 
        }

        .scratch-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            object-fit: cover;
            margin: 0 auto 15px auto;
            display: block;
        }

        .page-owner {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 12px;
            text-align: center;
        }

        .badge-display-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin: 0 auto 25px auto;
            min-height: 20px;
        }
        .badge-display-container img {
            height: 20px;
            width: auto;
            object-fit: contain;
        }

        button { 
            background: var(--text-color); 
            color: var(--bg-color); 
            border: 1px solid var(--text-color); 
            padding: 14px 28px; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: 600;
            cursor: pointer; 
            transition: opacity 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }
        button:hover { opacity: 0.8; }
        button:disabled { background: #cccccc; border-color: #cccccc; color: #666666; cursor: not-allowed; opacity: 1; }

        button.outline {
            background: transparent;
            color: #ff4757; 
            border: 1px solid #ffcccb;
            width: auto;
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 4px;
        }
        button.outline:hover { background: #fff5f5; border-color: #ff4757; opacity: 1; }
        
        button.primary-save {
            background: #2ed573;
            border-color: #2ed573;
            color: #fff;
            padding: 12px 24px;
            font-size: 14px;
            margin-top: 15px;
        }
        button.primary-save:hover { background: #26af5f; border-color: #26af5f; }

        /* 💬 回答用ミニボタン */
        button.answer-submit-btn {
            background: #1e90ff;
            border-color: #1e90ff;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            width: auto;
            margin-top: 5px;
        }
        button.answer-submit-btn:hover { background: #1076de; }

        .name-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            margin-bottom: 10px;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .name-input:focus { border-color: var(--text-color); }

        textarea {
            width: 100%;
            height: 140px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            resize: none;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            margin-bottom: 15px;
            background: var(--bg-color);
            color: var(--text-color);
        }
        textarea:focus { border-color: var(--text-color); }

        /* 回答入力用テキストエリア */
        .answer-textarea {
            width: 100%;
            height: 60px;
            padding: 8px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            resize: vertical;
            margin-top: 8px;
            box-sizing: border-box;
            display: block;
        }

        .notice { font-size: 12px; color: var(--sub-color); margin-top: 25px; line-height: 1.5; text-align: center; }
        .status { margin-top: 20px; font-size: 13px; color: var(--text-color); min-height: 1.5em; font-weight: 600; text-align: center; }
        .hidden { display: none !important; }
        .hp-trap { position: absolute; overflow: hidden; clip: rect(0 0 0 0); height: 1px; width: 1px; margin: -1px; padding: 0; border: 0; }
        
        .inbox-title { text-align: left; font-size: 16px; font-weight: 700; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid var(--text-color); padding-bottom: 8px; }
        
        /* 📜 質問とお題アイテムの装飾 */
        .odai-item { text-align: left; padding: 25px 0; font-size: 15px; line-height: 1.6; border-bottom: 1px solid var(--border-color); }
        .odai-item:first-child { padding-top: 0; }
        .odai-sender { font-size: 11px; color: var(--sub-color); margin-bottom: 6px; font-weight: 600; }
        
        /* 🎓 A: 回答表示ボックス */
        .answer-box {
            margin-top: 10px;
            padding: 12px 15px;
            background: var(--answer-bg);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-color);
            border-left: 4px solid var(--text-color);
        }
        .answer-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--sub-color);
            margin-bottom: 3px;
            display: block;
        }

        .info-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 8px; 
            font-size: 13px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 20px; 
            text-align: left; 
        }
        .info-card strong { font-size: 14px; color: var(--text-color); display: block; margin-bottom: 8px; }
        .info-card p { margin: 0 0 15px 0; color: var(--sub-color); font-size: 12px; line-height: 1.4; }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
            margin-top: 15px;
        }
        .badge-preview-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .settings-badge-flex {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .settings-badge-flex img {
            height: 20px;
            width: auto;
            object-fit: contain;
        }
        .no-badge-text {
            font-size: 12px;
            color: var(--sub-color);
            font-weight: normal;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-container input {
            cursor: pointer;
            width: 16px;
            height: 16px;
            margin: 0;
        }

        .badge-selector-group {
            margin-bottom: 15px;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
        }
        .badge-selector-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-color);
        }
        .badge-checkbox-flex-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .badge-checkbox-item {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            width: fit-content;
            transition: background 0.2s;
        }
        .badge-checkbox-item:hover {
            background: #f1f1f1;
        }
        .badge-checkbox-item input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin: 0;
        }
        .badge-checkbox-item img {
            height: 18px;
            width: auto;
            object-fit: contain;
        }
        .badge-checkbox-item span {
            font-size: 12px;
            font-weight: 600;
            color: var(--sub-color);
        }

        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
                align-items: stretch;
            }
            .left-column {
                max-width: 100% !important;
                position: static;
            }
            .right-column {
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Scrabako</h1>
    
    <!-- 👥 メインレイアウト（デフォルトで中央寄せモードを付与。お題出現時に外す） -->
    <div id="main-layout-wrapper" class="main-layout center-mode">
        
        <!-- 👈 左側カラム (固定情報・投稿・管理設定) -->
        <div class="left-column">
            <img id="scratch-avatar-display" class="scratch-avatar hidden" src="" alt="Avatar">
            <div id="page-owner-display" class="page-owner hidden"></div>
            <div id="custom-badge-display" class="badge-display-container hidden"></div>
                
            <!-- 1. 未ログイン -->
            <div id="logged-out-zone" class="hidden">
                <button id="login-btn">Scratchでログインしてお題箱を作る</button>
                <p class="notice">ログインすると、あなた専用のお題箱URLが作成されます。</p>
            </div>

            <!-- 2. お題送信画面 (一般ユーザー向け) -->
            <div id="send-zone" class="hidden">
                <div class="hp-trap">
                    <label>Leave this field blank</label>
                    <input type="text" id="hp-email-field" autocomplete="off">
                </div>
                <input type="text" id="sender-name-input" class="name-input" placeholder="ニックネーム（空欄なら匿名さん）" maxlength="20">
                <textarea id="odai-input" placeholder="メッセージを入力..."></textarea>
                <button id="send-btn">メッセージを送信</button>
                <p class="notice">このメッセージは相手に届きます。<br><a href="?" style="color: inherit;">自分のお題箱を作る</a></p>
            </div>

            <!-- 3. 管理画面 -->
            <div id="logged-in-zone" class="hidden">
                <div class="info-card" style="word-break: break-all;">
                    <strong>🔗 あなたのお題箱URL:</strong>
                    <span id="my-box-url" style="color: #555;"></span>
                </div>

                <div class="info-card">
                    <strong>⚙️ アカウント設定</strong>
                    <p>表示するバッチの選択、公開範囲の切り替え、ログアウトが行えます。</p>
                    
                    <div id="badge-select-wrapper" class="badge-selector-group hidden">
                        <div class="badge-selector-title">表示するバッチを選択（複数可）:</div>
                        <div id="badge-checkboxes-container" class="badge-checkbox-flex-container"></div>
                    </div>

                    <label class="checkbox-container">
                        <input type="checkbox" id="public-toggle-checkbox" checked>
                        <span>届いたお題を他人に公開する（Inboxの表示）</span>
                    </label>

                    <button id="save-settings-btn" class="primary-save">設定を保存する</button>

                    <div class="settings-row">
                        <div class="badge-preview-area">
                            <span>現在のバッチ:</span>
                            <span id="settings-badge-container" class="settings-badge-flex"></span>
                        </div>
                        <button id="logout-btn" class="outline">ログアウト</button>
                    </div>
                </div>
            </div>

            <div id="status" class="status"></div>
        </div>

        <!-- 👉 右側カラム (お題・Q&Aリスト) -->
        <div class="right-column">
            <div id="odai-list-section" class="hidden">
                <div class="inbox-title">Inbox / Q&A</div>
                <div id="odai-list"></div>
            </div>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, push, get, set, child, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
    
    import { BADGE_CONFIG } from "./badge-config.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAtEnMVm4Zwgo60dnwC_PtU-JmOvBheH9g",
        authDomain: "scrabako.firebaseapp.com",
        projectId: "scrabako",
        storageBucket: "scrabako.firebasestorage.app",
        messagingSenderId: "733907569048",
        appId: "1:733907569048:web:94b756e8dd8ea572dec3ed",
        databaseURL: "https://scrabako-default-rtdb.firebaseio.com/" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const MY_SITE_URL = window.location.origin + window.location.pathname; 

    const urlParams = new URLSearchParams(window.location.search);
    const targetBoxId = urlParams.get('id'); 
    const privateCode = urlParams.get('privateCode'); 

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const sendBtn = document.getElementById('send-btn');
    const saveSettingsBtn = document.getElementById('save-settings-btn');
    const odaiInput = document.getElementById('odai-input');
    const senderNameInput = document.getElementById('sender-name-input');
    const hpEmailField = document.getElementById('hp-email-field');
    const odaiListDiv = document.getElementById('odai-list');
    const odaiListSection = document.getElementById('odai-list-section');
    const mainLayoutWrapper = document.getElementById('main-layout-wrapper');
    const statusDiv = document.getElementById('status');
    
    const loggedOutZone = document.getElementById('logged-out-zone');
    const sendZone = document.getElementById('send-zone');
    const loggedInZone = document.getElementById('logged-in-zone');
    const pageOwnerDisplay = document.getElementById('page-owner-display');
    const myBoxUrlSpan = document.getElementById('my-box-url');
    const customBadgeDisplay = document.getElementById('custom-badge-display');
    const settingsBadgeContainer = document.getElementById('settings-badge-container');
    const publicToggleCheckbox = document.getElementById('public-toggle-checkbox');
    const scratchAvatarDisplay = document.getElementById('scratch-avatar-display');
    const badgeSelectWrapper = document.getElementById('badge-select-wrapper');
    const badgeCheckboxesContainer = document.getElementById('badge-checkboxes-container');

    function loadScratchAvatar(username) {
        if (!username) {
            scratchAvatarDisplay.classList.add('hidden');
            return;
        }
        fetch(`https://testdev.f5.si/scratch-api.php?user=${encodeURIComponent(username)}`)
            .then(res => res.json())
            .then(data => {
                if (data.profile && data.profile.images && data.profile.images['90x90']) {
                    scratchAvatarDisplay.src = data.profile.images['90x90'];
                    scratchAvatarDisplay.classList.remove('hidden');
                }
            })
            .catch(() => {
                scratchAvatarDisplay.classList.add('hidden');
            });
    }

    function getUserAvailableBadges(username) {
        const list = [];
        if (!username) return list;
        const lowerName = username.toLowerCase();

        for (const type in BADGE_CONFIG) {
            if (BADGE_CONFIG[type] && BADGE_CONFIG[type][lowerName]) {
                list.push({ type: type, url: BADGE_CONFIG[type][lowerName] });
            }
        }
        return list;
    }

    function checkCooldown() {
        if (!targetBoxId) return;
        const lastSent = localStorage.getItem(`last_sent_${targetBoxId.toLowerCase()}`);
        if (lastSent) {
            const timeLeft = Math.ceil((parseInt(lastSent) + 30000 - Date.now()) / 1000);
            if (timeLeft > 0) startCooldownTimer(timeLeft);
        }
    }

    function startCooldownTimer(seconds) {
        sendBtn.disabled = true;
        let currentSeconds = seconds;
        const interval = setInterval(() => {
            currentSeconds--;
            if (currentSeconds <= 0) {
                clearInterval(interval);
                sendBtn.disabled = false;
                sendBtn.innerText = "メッセージを送信";
            } else {
                sendBtn.innerText = `連続送信不可 (残り ${currentSeconds}秒...)`;
            }
        }, 1000);
    }

    window.addEventListener('DOMContentLoaded', async () => {
        const savedUser = localStorage.getItem('scratch_username');
        const redirectUrlWithParam = privateCode ? MY_SITE_URL : window.location.href;
        const base64Url = btoa(encodeURIComponent(redirectUrlWithParam).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));

        if (privateCode) {
            statusDiv.innerText = 'アカウント検証中...';
            try {
                const verifyUrl = `https://auth-api.itinerary.eu.org/auth/verifyToken/${privateCode}?method=comment&redirect=${encodeURIComponent(base64Url)}`;
                const response = await fetch(verifyUrl);
                const data = await response.json();

                if (data.valid && data.username) {
                    localStorage.setItem('scratch_username', data.username);
                    window.location.href = `?id=${data.username}`;
                } else {
                    statusDiv.innerText = '認証に失敗しました。';
                }
            } catch (error) {
                console.error(error);
                statusDiv.innerText = '通信エラーが発生しました。';
            }
            return;
        }

        if (targetBoxId) {
            if (savedUser && savedUser.toLowerCase() === targetBoxId.toLowerCase()) {
                await showLoggedIn(savedUser);
            } else {
                await showSendPage(targetBoxId);
                checkCooldown();
            }
        } else {
            if (savedUser) {
                window.location.href = `?id=${savedUser}`;
            } else {
                loggedOutZone.classList.remove('hidden');
                mainLayoutWrapper.classList.add('center-mode');
            }
        }
    });

    loginBtn.addEventListener('click', () => {
        statusDiv.innerText = '接続中...';
        const appName = encodeURIComponent("Scrabako");
        const redirectUrlWithParam = window.location.href;
        const base64Url = btoa(encodeURIComponent(redirectUrlWithParam).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
        window.location.href = `https://auth.itinerary.eu.org/auth/?redirect=${base64Url}&name=${appName}`;
    });

    logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('scratch_username');
        window.location.href = '?';
    });

    function updateSettingsBadgePreview(username, checkedTypes) {
        const savedUser = username.toLowerCase();
        if (!checkedTypes || checkedTypes.length === 0) {
            settingsBadgeContainer.innerHTML = `<span class="no-badge-text">なし（非表示）</span>`;
            return;
        }
        let html = "";
        checkedTypes.forEach(type => {
            const badgeUrl = BADGE_CONFIG[type] ? BADGE_CONFIG[type][savedUser] : "";
            if (badgeUrl) html += `<img src="${badgeUrl}" alt="Badge">`;
        });
        settingsBadgeContainer.innerHTML = html || `<span class="no-badge-text">なし</span>`;
    }

    saveSettingsBtn.addEventListener('click', async () => {
        const savedUser = localStorage.getItem('scratch_username');
        if (!savedUser) return;
        
        const lowerUser = savedUser.toLowerCase();
        saveSettingsBtn.disabled = true;
        statusDiv.innerText = '設定を保存中...';

        const currentCheckedBadges = Array.from(badgeCheckboxesContainer.querySelectorAll('input:checked')).map(el => el.value);
        const currentPublicInboxFlag = publicToggleCheckbox.checked;

        try {
            await set(ref(db, `settings/${lowerUser}`), {
                publicInbox: currentPublicInboxFlag,
                selectedBadges: currentCheckedBadges
            });
            statusDiv.innerText = '設定を保存しました！';
            setTimeout(() => { statusDiv.innerText = ''; }, 3000);
            
            // 公開設定変更に伴い画面再描画
            if(currentPublicInboxFlag) {
                renderOdai(savedUser, true);
            } else {
                odaiListSection.classList.add('hidden');
                mainLayoutWrapper.classList.add('center-mode');
            }
        } catch (e) {
            console.error(e);
            statusDiv.innerText = '設定の保存に失敗しました。';
        } finally {
            saveSettingsBtn.disabled = false;
        }
    });

    sendBtn.addEventListener('click', async () => {
        const text = odaiInput.value.trim();
        if (!text) return;
        if (hpEmailField.value) {
            odaiInput.value = '';
            statusDiv.innerText = `@${targetBoxId} さんにお題を送信しました`;
            return;
        }
        const senderName = senderNameInput.value.trim() || "匿名さん";

        try {
            await push(ref(db, `odais/${targetBoxId.toLowerCase()}`), {
                sender: senderName,
                content: text,
                createdAt: serverTimestamp(),
                answer: "" // 初期状態は空
            });

            localStorage.setItem(`last_sent_${targetBoxId.toLowerCase()}`, Date.now().toString());
            startCooldownTimer(30);

            odaiInput.value = '';
            senderNameInput.value = '';
            statusDiv.innerText = `@${targetBoxId} さんにお題を送信しました`;
            setTimeout(() => { if(!sendBtn.disabled) statusDiv.innerText = ''; }, 3000);
        } catch (e) {
            console.error(e);
            statusDiv.innerText = '送信に失敗しました。';
        }
    });

    async function showLoggedIn(username) {
        loggedInZone.classList.remove('hidden');
        pageOwnerDisplay.innerText = `@${username} の管理画面`;
        pageOwnerDisplay.classList.remove('hidden');
        customBadgeDisplay.classList.add('hidden'); 
        
        loadScratchAvatar(username);
        myBoxUrlSpan.innerText = `${MY_SITE_URL}?id=${username}`;
        
        const lowerUser = username.toLowerCase();
        let firebaseSettings = { publicInbox: true, selectedBadges: null };
        try {
            const snapshot = await get(ref(db, `settings/${lowerUser}`));
            if (snapshot.exists()) firebaseSettings = snapshot.val();
        } catch (e) { console.error(e); }

        publicToggleCheckbox.checked = firebaseSettings.publicInbox !== false;
        const availableBadges = getUserAvailableBadges(username);
        
        if (availableBadges.length > 0) {
            badgeSelectWrapper.classList.remove('hidden');
            badgeCheckboxesContainer.innerHTML = '';
            let checkedTypes = Array.isArray(firebaseSettings.selectedBadges) ? firebaseSettings.selectedBadges : [];

            availableBadges.forEach(b => {
                const label = document.createElement('label');
                label.className = 'badge-checkbox-item';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = b.type;
                checkbox.checked = checkedTypes.includes(b.type);

                const img = document.createElement('img');
                img.src = b.url; img.alt = b.type;
                const txt = document.createElement('span');
                txt.innerText = `(${b.type})`;

                checkbox.addEventListener('change', () => {
                    const tempChecked = Array.from(badgeCheckboxesContainer.querySelectorAll('input:checked')).map(el => el.value);
                    updateSettingsBadgePreview(username, tempChecked);
                });

                label.appendChild(checkbox); label.appendChild(img); label.appendChild(txt);
                badgeCheckboxesContainer.appendChild(label);
            });
            updateSettingsBadgePreview(username, checkedTypes);
        } else {
            badgeSelectWrapper.classList.add('hidden');
            settingsBadgeContainer.innerHTML = `<span class="no-badge-text">なし（一般ユーザー）</span>`;
        }

        renderOdai(username, true);
    }

    async function showSendPage(ownerName) {
        pageOwnerDisplay.innerText = `@${ownerName} のお題箱`;
        pageOwnerDisplay.classList.remove('hidden');
        sendZone.classList.remove('hidden');
        loadScratchAvatar(ownerName);
        
        const lowerOwner = ownerName.toLowerCase();
        let ownerSettings = { publicInbox: true, selectedBadges: null };
        try {
            const snapshot = await get(ref(db, `settings/${lowerOwner}`));
            if (snapshot.exists()) ownerSettings = snapshot.val();
        } catch (e) { console.error(e); }
        
        let checkedTypes = Array.isArray(ownerSettings.selectedBadges) ? ownerSettings.selectedBadges : [];
        customBadgeDisplay.innerHTML = '';
        let hasAnyBadge = false;

        checkedTypes.forEach(type => {
            const badgeUrl = BADGE_CONFIG[type] ? BADGE_CONFIG[type][lowerOwner] : "";
            if (badgeUrl) {
                const img = document.createElement('img');
                img.src = badgeUrl; img.alt = type;
                customBadgeDisplay.appendChild(img);
                hasAnyBadge = true;
            }
        });

        if (hasAnyBadge) customBadgeDisplay.classList.remove('hidden');

        const isInboxPublic = ownerSettings.publicInbox !== false;
        if (isInboxPublic) {
            renderOdai(ownerName, false);
        } else {
            odaiListSection.classList.add('hidden');
            mainLayoutWrapper.classList.add('center-mode'); // 非公開ならど真ん中配置
        }
    }

    // 📜 Q&Aリストの生成と描画
    async function renderOdai(username, isAdminView) {
        odaiListDiv.innerHTML = '';
        try {
            const snapshot = await get(ref(db, `odais/${username.toLowerCase()}`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                
                // 投稿一覧を反転させて最新を上に
                const keys = Object.keys(data).reverse();
                let visibleCount = 0;

                keys.forEach(id => {
                    const item = data[id];
                    
                    // 管理者画面ではなく一般公開画面の時、かつ「回答が空」なら表示をスキップ（Q&Aされたものだけ見せる）
                    if (!isAdminView && !item.answer) {
                        return;
                    }

                    visibleCount++;

                    const div = document.createElement('div');
                    div.className = 'odai-item';
                    
                    const senderDiv = document.createElement('div');
                    senderDiv.className = 'odai-sender';
                    senderDiv.innerText = `From: ${item.sender || '匿名さん'}`;
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.innerText = item.content;
                    
                    div.appendChild(senderDiv);
                    div.appendChild(contentDiv);

                    // 🎓 回答データの表示がある場合
                    if (item.answer) {
                        const ansBox = document.createElement('div');
                        ansBox.className = 'answer-box';
                        ansBox.innerHTML = `<span class="answer-label">A: 回答</span>${item.answer}`;
                        div.appendChild(ansBox);
                    }

                    // ⚙️ 管理者の場合は、回答入力フォームをセット
                    if (isAdminView) {
                        const replyForm = document.createElement('div');
                        replyForm.style.marginTop = "10px";

                        const replyInput = document.createElement('textarea');
                        replyInput.className = 'answer-textarea';
                        replyInput.placeholder = item.answer ? '回答を修正する...' : '回答を入力してQ&Aとして公開...';
                        replyInput.value = item.answer || '';

                        const replyBtn = document.createElement('button');
                        replyBtn.className = 'answer-submit-btn';
                        replyBtn.innerText = item.answer ? '回答を更新' : '回答を公開';
                        
                        replyBtn.addEventListener('click', async () => {
                            replyBtn.disabled = true;
                            const newAnswerText = replyInput.value.trim();
                            try {
                                await set(ref(db, `odais/${username.toLowerCase()}/${id}/answer`), newAnswerText);
                                renderOdai(username, true); // 再描写
                            } catch(err) {
                                console.error(err);
                                alert("回答の保存に失敗しました。");
                            } finally {
                                replyBtn.disabled = false;
                            }
                        });

                        replyForm.appendChild(replyInput);
                        replyForm.appendChild(replyBtn);
                        div.appendChild(replyForm);
                    }

                    odaiListDiv.appendChild(div);
                });

                // 表示するお題が1件以上あれば2カラム化、ゼロならど真ん中に配置
                if (visibleCount > 0) {
                    odaiListSection.classList.remove('hidden');
                    mainLayoutWrapper.classList.remove('center-mode');
                } else {
                    odaiListSection.classList.add('hidden');
                    mainLayoutWrapper.classList.add('center-mode');
                }
            } else {
                odaiListSection.classList.add('hidden');
                mainLayoutWrapper.classList.add('center-mode');
            }
        } catch (e) {
            console.error(e);
        }
    }
</script>
